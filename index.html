<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Tic-Tac-Toe</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-color: #16213e;
            --text-color: #e94560;
            --cell-size: 100px;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrolling on mobile */
        }

        .game-container {
            text-align: center;
        }

        h1 { color: var(--text-color); margin-top: 0; margin-bottom: 10px; }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: #0f3460;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #status {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 1.5rem; /* Keeps layout from jumping */
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, var(--cell-size));
            grid-template-rows: repeat(3, var(--cell-size));
            gap: 10px;
            background-color: #0f3460;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--card-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell:active { transform: scale(0.95); }
        .cell.taken { cursor: not-allowed; }

        .cell[data-symbol="X"] { color: #00d2ff; }
        .cell[data-symbol="O"] { color: var(--text-color); }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="scoreboard">
            <div>X Wins: <span id="scoreX">0</span></div>
            <div>O Wins: <span id="scoreO">0</span></div>
        </div>

        <div id="status">Connecting to server...</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        // 1. Connect to your Render backend
        const socket = io("https://tictactoe-bt0d.onrender.com", {
            transports: ["websocket", "polling"]
        });

        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');
        const scoreX = document.getElementById('scoreX');
        const scoreO = document.getElementById('scoreO');

        let mySymbol = null;
        let isMyTurn = false;

        // 2. Ask for Room ID as soon as the page loads
        const roomID = prompt("Enter a Room Name to join (e.g., 'room1'):") || "lobby";
        socket.emit('joinRoom', roomID);

        // 3. Handle Initialization (Matches your server's socket.emit('init', {symbol, scores}))
        socket.on('init', ({ symbol, scores }) => {
            mySymbol = symbol;
            isMyTurn = (symbol === 'X'); // X always goes first in a fresh room
            
            // Populate scores from DB
            scoreX.innerText = scores.x_wins;
            scoreO.innerText = scores.o_wins;
            
            updateStatus();
        });

        // Update the text at the top so the player knows what to do
        function updateStatus() {
            if (isMyTurn) {
                statusDisplay.innerText = `Your turn (${mySymbol})`;
                statusDisplay.style.color = "#00ff00";
            } else {
                statusDisplay.innerText = "Opponent's turn...";
                statusDisplay.style.color = "white";
            }
        }

        // 4. Handle Clicks on the Board
        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                const index = e.target.getAttribute('data-index');
                
                // Block the click if it's not our turn, or if the cell is full
                if (!isMyTurn || e.target.innerText !== '') return;

                // Tell the server we moved
                socket.emit('makeMove', index);
                
                // Immediately lock the board for us
                isMyTurn = false;
                updateStatus();
            });
        });

        // 5. Handle Board Updates from the Server
        socket.on('updateBoard', ({ index, symbol }) => {
            const cell = cells[index];
            cell.innerText = symbol;
            cell.setAttribute('data-symbol', symbol);
            cell.classList.add('taken');

            // If the other player just moved, it is now our turn
            if (symbol !== mySymbol) {
                isMyTurn = true;
                updateStatus();
            }
        });

        // 6. Handle Game Over Logic
        socket.on('gameOver', ({ winner }) => {
            setTimeout(() => {
                if (winner === 'Draw') {
                    alert("It's a Draw!");
                } else {
                    alert(`Player ${winner} wins!`);
                    
                    // Visually update the score immediately
                    if (winner === 'X') scoreX.innerText = parseInt(scoreX.innerText) + 1;
                    if (winner === 'O') scoreO.innerText = parseInt(scoreO.innerText) + 1;
                }

                // Clean the board for the next round
                cells.forEach(cell => {
                    cell.innerText = '';
                    cell.classList.remove('taken');
                    cell.removeAttribute('data-symbol');
                });

                // Based on your server logic, the player who made the last move gets to go first in the next round
                // because the server doesn't toggle 'room.turn' on a winning move.
                isMyTurn = (mySymbol === winner || winner === 'Draw' && !isMyTurn);
                updateStatus();
                
            }, 100); // Slight delay so the final X/O draws on the screen before the alert pops up
        });

    </script>
</body>
          </html>
