<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --x: #ef4444; --o: #10b981; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: var(--card); color: white; margin-bottom: 10px; width: 80%; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; justify-content: center; margin: 20px 0; }
        .cell { width: 90px; height: 90px; background: var(--card); border-radius: 12px; font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .scoreboard { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        #status { margin: 10px 0; font-weight: bold; color: #facc15; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>Enter Room Code</h2>
        <input type="text" id="roomInput" placeholder="Ex: MONKEY">
        <br>
        <button onclick="join()">Join Game</button>
    </div>

    <div id="game" class="hidden">
        <div class="scoreboard">
            <div style="color: var(--x)">X: <span id="scoreX">0</span></div>
            <div id="roomTitle">Room: --</div>
            <div style="color: var(--o)">O: <span id="scoreO">0</span></div>
        </div>
        <div id="status">Waiting for opponent...</div>
        <div class="grid" id="grid"></div>
        <button id="rematchBtn" class="hidden" onclick="rematch()" style="background: var(--o); margin-bottom: 10px;">Play Again</button>
        <br>
        <button onclick="location.reload()" style="background: #475569;">Exit Room</button>
    </div>

    <script>
        // CHANGE THIS TO YOUR RENDER URL (Keep the https://)
        const SERVER_URL = "https://tictactoe-bt0d.onrender.com"; 
        
        // FIX: Using io() correctly
        const socket = io(SERVER_URL); 
        
        let mySymbol, roomCode;

        // Create Grid
        const gridDiv = document.getElementById('grid');
        for(let i=0; i<9; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.onclick = () => socket.emit('makeMove', { roomId: roomCode, index: i });
            gridDiv.appendChild(div);
        }

        function join() {
            roomCode = document.getElementById('roomInput').value.toUpperCase();
            if(roomCode) socket.emit('joinRoom', roomCode);
        }

        function rematch() {
            socket.emit('rematch', roomCode);
        }

        socket.on('joined', data => {
            mySymbol = data.symbol;
            roomCode = data.roomId;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('roomTitle').innerText = roomCode;
        });

        socket.on('gameState', room => {
            document.getElementById('scoreX').innerText = room.scores.X;
            document.getElementById('scoreO').innerText = room.scores.O;
            
            const cells = document.querySelectorAll('.cell');
            room.board.forEach((val, i) => {
                cells[i].innerText = val || '';
                cells[i].style.color = val === 'X' ? 'var(--x)' : 'var(--o)';
            });

            const rematchBtn = document.getElementById('rematchBtn');
            if (room.winner) {
                document.getElementById('status').innerText = room.winner === 'Draw' ? "Draw!" : `Winner: ${room.winner}`;
                rematchBtn.classList.remove('hidden');
            } else {
                rematchBtn.classList.add('hidden');
                document.getElementById('status').innerText = room.currentTurn === mySymbol ? "Your Turn" : "Opponent's Turn";
            }
        });

        socket.on('playerLeft', msg => alert(msg));
        socket.on('error', msg => alert(msg));
    </script>
</body>
</html>
