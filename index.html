<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #222; border: 1px solid #444; font-size: 2rem; display: flex; align-items: center; justify-content: center; color: cyan; }
        .cell:active { background: #333; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; border-radius: 8px; border: none; background: #ff4757; color: white; }
    </style>
</head>
<body>
    <h2>Tic-Tac-Toe</h2>
    <p id="status">Connecting...</p>
    <div class="grid" id="grid"></div>
    <button onclick="reset()">Reset Game</button>

    <script>
        // REPLACE THIS with your Render URL
        const SERVER_URL = "https://tictactoe-bt0d.onrender.com"; 
        const socket = io(SERVER_URL);
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');

        // Create the 9 cells
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => socket.emit('move', i);
            grid.appendChild(cell);
        }

        socket.on('update', (data) => {
            status.innerText = `Next Player: ${data.xIsNext ? 'X' : 'O'}`;
            const cells = document.querySelectorAll('.cell');
            data.board.forEach((val, i) => {
                cells[i].innerText = val || '';
                cells[i].style.color = val === 'X' ? '#ff4757' : '#2ed573';
            });
        });

        function reset() {
            socket.emit('reset');
        }
    </script>
</body>
</html>
